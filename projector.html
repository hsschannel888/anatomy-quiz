<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anatomy Quick Quiz - จอแสดงผล</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
    background: #241b3d; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .stage { width: 100%; max-width: 1100px; padding: 40px; text-align: center; }
  .waiting-title { font-size: 42px; font-weight: 700; margin-bottom: 12px; }
  .waiting-sub { font-size: 20px; color: #c9b8e8; }
  .q-no { font-size: 22px; color: #ffd166; font-weight: 600; margin-bottom: 14px; }
  .timer { font-size: 64px; font-weight: 700; margin-bottom: 24px; }
  .timer.low { color: #f0997b; }
  .q-image { max-width: 420px; max-height: 300px; border-radius: 22px; margin: 0 auto 24px; display: block; }
  .q-text { font-size: 34px; font-weight: 600; margin-bottom: 32px; line-height: 1.4; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; max-width: 800px; margin: 0 auto; }
  .choice-box {
    background: #362a5c; border: 2px solid #4d3d80; border-radius: 22px; padding: 22px; font-size: 24px; text-align: left;
    display: flex; align-items: center; gap: 16px;
  }
  .choice-letter {
    width: 40px; height: 40px; border-radius: 50%; background: #4d3d80; display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0;
  }
  .time-up { font-size: 40px; font-weight: 700; margin-bottom: 30px; color: #f0997b; }
  .leaderboard { max-width: 560px; margin: 0 auto; text-align: left; }
  .lb-title { font-size: 26px; font-weight: 700; margin-bottom: 20px; text-align: center; }
  .lb-row {
    display: flex; align-items: center; gap: 16px; padding: 14px 20px; background: #362a5c; border-radius: 18px; margin-bottom: 10px;
  }
  .lb-rank { font-size: 20px; font-weight: 700; width: 30px; color: #ffd166; }
  .lb-name { flex: 1; font-size: 18px; }
  .lb-score { font-size: 18px; font-weight: 700; color: #ffd166; }
  .finished-title { font-size: 46px; font-weight: 700; margin-bottom: 40px; }
  body.themed { background-size: cover; background-position: center; background-repeat: no-repeat; }
  .stage.themed {
    background: rgba(255,255,255,0.94); border-radius: 32px; padding: 48px 40px; color: #2c2c2a;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
  }
  .stage.themed .waiting-sub { color: #6b5f63; }
  .stage.themed .timer { color: #2c2c2a; }
  .stage.themed .timer.low { color: #d85a30; }
  .stage.themed .q-no { color: #b9860a; }
  .stage.themed .choice-box { background: #fff3d6; border-color: #f0c869; color: #2c2c2a; }
  .stage.themed .choice-letter { background: #f0c869; color: #6b4a06; }
  .stage.themed .lb-row { background: #f7f3e8; }
  .stage.themed .lb-rank, .stage.themed .lb-score { color: #b9860a; }
  .stage.themed .time-up { color: #d85a30; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = "https://jepqcpxgffjlbpucyxhq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcHFjcHhnZmZqbGJwdWN5eGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTA3NzAsImV4cCI6MjA5OTkyNjc3MH0.RBsPcR1ujyD3ZE_JWslAaGDUJqJD7ku0TWn37tZDbCM";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const QUESTION_SECONDS = 30;

function Leaderboard({ title }) {
  const [rows, setRows] = useState([]);

  const load = async () => {
    const { data: subs } = await supabase.from("submissions").select("participant_id, score");
    const { data: participants } = await supabase.from("participants").select("id, first_name, last_name");
    const nameMap = {};
    (participants || []).forEach(p => { nameMap[p.id] = `${p.first_name} ${p.last_name}`; });
    const totals = {};
    (subs || []).forEach(s => { totals[s.participant_id] = (totals[s.participant_id] || 0) + (s.score || 0); });
    const ranked = Object.entries(totals)
      .map(([pid, score]) => ({ name: nameMap[pid] || "ไม่ทราบชื่อ", score }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 5);
    setRows(ranked);
  };

  useEffect(() => { load(); const t = setInterval(load, 3000); return () => clearInterval(t); }, []);

  return (
    <div className="leaderboard">
      <div className="lb-title">{title}</div>
      {rows.map((r, i) => (
        <div className="lb-row" key={i}>
          <span className="lb-rank">{i + 1}</span>
          <span className="lb-name">{r.name}</span>
          <span className="lb-score">{r.score}</span>
        </div>
      ))}
      {rows.length === 0 && <p style={{ textAlign: "center", color: "#9db3a5" }}>ยังไม่มีคะแนน</p>}
    </div>
  );
}

function HardestQuestions() {
  const [rows, setRows] = useState([]);

  const load = async () => {
    const { data: questions } = await supabase.from("questions").select("id, question_no, question_text");
    const { data: subs } = await supabase.from("submissions").select("question_id, is_correct");
    const qMap = {};
    (questions || []).forEach(q => { qMap[q.id] = q; });
    const wrongCount = {}; const totalCount = {};
    (subs || []).forEach(s => {
      totalCount[s.question_id] = (totalCount[s.question_id] || 0) + 1;
      if (!s.is_correct) wrongCount[s.question_id] = (wrongCount[s.question_id] || 0) + 1;
    });
    const ranked = Object.entries(wrongCount)
      .map(([qid, count]) => ({ ...qMap[qid], wrong: count, total: totalCount[qid] || 0 }))
      .filter(r => r.question_no != null)
      .sort((a, b) => b.wrong - a.wrong)
      .slice(0, 5);
    setRows(ranked);
  };

  useEffect(() => { load(); }, []);

  if (rows.length === 0) return null;

  return (
    <div className="leaderboard" style={{ marginTop: 32 }}>
      <div className="lb-title">🔥 ข้อที่พลาดกันเยอะที่สุด</div>
      {rows.map((r, i) => (
        <div className="lb-row" key={r.question_no}>
          <span className="lb-rank">{i + 1}</span>
          <span className="lb-name">ข้อ {r.question_no}: {r.question_text}</span>
          <span className="lb-score">ผิด {r.wrong}/{r.total}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [question, setQuestion] = useState(null);
  const [secondsLeft, setSecondsLeft] = useState(QUESTION_SECONDS);
  const tickRef = useRef(null);

  const loadSession = async () => {
    const { data } = await supabase.from("session").select("*").eq("id", 1).single();
    setSession(data);
  };

  useEffect(() => {
    loadSession();
    const channel = supabase.channel("projector-session-watch")
      .on("postgres_changes", { event: "*", schema: "public", table: "session" }, () => loadSession())
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, []);

  useEffect(() => {
    if (!session || !session.current_question_no) { setQuestion(null); return; }
    supabase.from("questions").select("*").eq("question_no", session.current_question_no).single()
      .then(({ data }) => setQuestion(data));
  }, [session && session.current_question_no]);

  useEffect(() => {
    clearInterval(tickRef.current);
    if (!session || !session.question_started_at) return;
    const started = new Date(session.question_started_at).getTime();
    const update = () => {
      const elapsed = (Date.now() - started) / 1000;
      setSecondsLeft(Math.max(0, Math.ceil(QUESTION_SECONDS - elapsed)));
    };
    update();
    tickRef.current = setInterval(update, 250);
    return () => clearInterval(tickRef.current);
  }, [session && session.question_started_at]);

  const themeUrl = session && session.theme_image_url;
  useEffect(() => {
    if (themeUrl) {
      document.body.classList.add("themed");
      document.body.style.backgroundImage = `url(${themeUrl})`;
    } else {
      document.body.classList.remove("themed");
      document.body.style.backgroundImage = "";
    }
  }, [themeUrl]);
  const stageClass = `stage ${themeUrl ? "themed" : ""}`;

  if (!session) return <div className="stage"><p className="waiting-sub">กำลังโหลด...</p></div>;

  if (session.status === "finished") {
    return (
      <div className={stageClass}>
        <div className="finished-title">🏆✨ ผลการแข่งขัน ✨🏆</div>
        <Leaderboard title="อันดับสุดท้าย" />
        <HardestQuestions />
      </div>
    );
  }

  if (session.status === "waiting" || !question) {
    return (
      <div className={stageClass}>
        <div className="waiting-title">🦴 Anatomy Quick Quiz ✨</div>
        <div className="waiting-sub">กำลังจะเริ่มการแข่งขันเร็วๆ นี้</div>
      </div>
    );
  }

  if (secondsLeft <= 0) {
    return (
      <div className={stageClass}>
        <div className="time-up">⏰ หมดเวลาข้อที่ {question.question_no}</div>
        <Leaderboard title="อันดับปัจจุบัน" />
      </div>
    );
  }

  return (
    <div className={stageClass}>
      <div className="q-no">ข้อที่ {question.question_no}</div>
      <div className={`timer ${secondsLeft <= 10 ? "low" : ""}`}>{secondsLeft}</div>
      {question.image_url && <img className="q-image" src={question.image_url} alt="" />}
      <div className="q-text">{question.question_text}</div>
      <div className="choices">
        <div className="choice-box"><span className="choice-letter">A</span>{question.choice_a}</div>
        <div className="choice-box"><span className="choice-letter">B</span>{question.choice_b}</div>
        <div className="choice-box"><span className="choice-letter">C</span>{question.choice_c}</div>
        <div className="choice-box"><span className="choice-letter">D</span>{question.choice_d}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
