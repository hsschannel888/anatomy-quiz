<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ควบคุมการแข่งขัน - Anatomy Quick Quiz</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #4a3540; --ink-soft: #9b8790; --line: #f5dfe6; --bg: #fff8f3; --card: #fff;
    --accent: #16b897; --accent-soft: #d9f5ec; --danger: #ef6f6f; --danger-soft: #ffe8e8;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system,"Segoe UI","Noto Sans Thai",sans-serif; background: var(--bg); color: var(--ink); }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 20px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 24px; margin-bottom: 18px; }
  .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .status-pill { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 20px; }
  .status-waiting { background: #eef0ec; color: var(--ink-soft); }
  .status-live { background: var(--accent-soft); color: var(--accent); }
  .status-finished { background: var(--danger-soft); color: var(--danger); }
  .q-display { text-align: center; padding: 20px 0; }
  .q-no { font-size: 13px; color: var(--ink-soft); }
  .q-text { font-size: 20px; font-weight: 600; margin: 8px 0 4px; }
  .submit-count { font-size: 14px; color: var(--ink-soft); }
  .controls { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  button { font-family: inherit; font-size: 14px; font-weight: 600; border-radius: 14px; border: none; padding: 12px 22px; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #119b81; }
  .btn-primary:disabled { background: #a9b4ae; cursor: not-allowed; }
  .btn-danger { background: var(--danger-soft); color: var(--danger); }
  .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink-soft); }
  .qlist { max-height: 320px; overflow-y: auto; }
  .qlist-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: 12px; font-size: 13px; }
  .qlist-row.current { background: var(--accent-soft); font-weight: 600; }
  .login-box { max-width: 360px; margin: 80px auto 0; }
  label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; font-weight: 500; }
  .login-box input { width: 100%; margin-bottom: 14px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 14px; font-size: 14px; }
  .error-msg { background: var(--danger-soft); color: var(--danger); padding: 10px 14px; border-radius: 14px; font-size: 13px; margin-bottom: 14px; }

  .btn-primary, button.primary { border-radius: 999px !important; box-shadow: 0 3px 10px rgba(22,184,151,0.25); }
  .card { box-shadow: 0 3px 14px rgba(74,53,64,0.06); }
  h1 { letter-spacing: -0.2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = "https://jepqcpxgffjlbpucyxhq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcHFjcHhnZmZqbGJwdWN5eGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTA3NzAsImV4cCI6MjA5OTkyNjc3MH0.RBsPcR1ujyD3ZE_JWslAaGDUJqJD7ku0TWn37tZDbCM";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function LoginBox({ onLoggedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const handleLogin = async () => {
    setError("");
    const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
    if (err) { setError("อีเมลหรือรหัสผ่านไม่ถูกต้อง"); return; }
    onLoggedIn(data.session);
  };
  return (
    <div className="login-box">
      <div className="card">
        <h1>🔐 เข้าสู่ระบบแอดมิน</h1>
        <p className="sub">หน้าควบคุมการแข่งขัน</p>
        {error && <div className="error-msg">{error}</div>}
        <label>อีเมล</label>
        <input value={email} onChange={e => setEmail(e.target.value)} />
        <label>รหัสผ่าน</label>
        <input type="password" value={password} onChange={e => setPassword(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleLogin()} />
        <button className="btn-primary" style={{ width: "100%" }} onClick={handleLogin}>เข้าสู่ระบบ</button>
      </div>
    </div>
  );
}

function ControlPanel() {
  const [session, setSession] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [submitCount, setSubmitCount] = useState(0);
  const [busy, setBusy] = useState(false);

  const loadQuestions = async () => {
    const { data } = await supabase.from("questions").select("id,question_no,question_text").order("question_no", { ascending: true });
    setQuestions(data || []);
  };
  const loadSession = async () => {
    const { data } = await supabase.from("session").select("*").eq("id", 1).single();
    setSession(data);
  };

  useEffect(() => {
    loadQuestions();
    loadSession();

    const sessionChannel = supabase.channel("admin-session-watch")
      .on("postgres_changes", { event: "*", schema: "public", table: "session" }, () => loadSession())
      .subscribe();

    return () => { supabase.removeChannel(sessionChannel); };
  }, []);

  useEffect(() => {
    if (!session || !session.current_question_no) { setSubmitCount(0); return; }
    const currentQ = questions.find(q => q.question_no === session.current_question_no);
    if (!currentQ) return;

    const fetchCount = async () => {
      const { count } = await supabase.from("submissions").select("id", { count: "exact", head: true }).eq("question_id", currentQ.id);
      setSubmitCount(count || 0);
    };
    fetchCount();

    const channel = supabase.channel("admin-submit-watch-" + currentQ.id)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "submissions", filter: `question_id=eq.${currentQ.id}` }, () => fetchCount())
      .subscribe();

    return () => { supabase.removeChannel(channel); };
  }, [session, questions]);

  const goToQuestion = async (qno) => {
    setBusy(true);
    await supabase.rpc("admin_set_question", { p_question_no: qno });
    setBusy(false);
  };

  const finishQuiz = async () => {
    if (!window.confirm("จบการแข่งขันตอนนี้เลยหรือไม่?")) return;
    setBusy(true);
    await supabase.from("session").update({ status: "finished" }).eq("id", 1);
    setBusy(false);
  };

  const resetSession = async () => {
    if (!window.confirm("รีเซ็ตกลับไปหน้ารอเริ่ม?")) return;
    setBusy(true);
    await supabase.from("session").update({ status: "waiting", current_question_no: null, question_started_at: null }).eq("id", 1);
    setBusy(false);
  };

  if (!session) return <p className="sub">กำลังโหลด...</p>;

  const currentQ = questions.find(q => q.question_no === session.current_question_no);
  const nextQno = session.current_question_no ? session.current_question_no + 1 : 1;
  const hasNext = questions.some(q => q.question_no === nextQno);

  return (
    <div>
      <h1>🎮 ควบคุมการแข่งขัน</h1>
      <p className="sub">Anatomy Quick Quiz</p>

      <div className="card">
        <div className="status-row">
          <span className={`status-pill status-${session.status}`}>
            {session.status === "waiting" && "รอเริ่ม"}
            {session.status === "live" && "กำลังแข่งขัน"}
            {session.status === "finished" && "จบการแข่งขันแล้ว"}
          </span>
          <span className="sub" style={{ margin: 0 }}>ทั้งหมด {questions.length} ข้อ</span>
        </div>

        {currentQ ? (
          <div className="q-display">
            <div className="q-no">ข้อที่ {currentQ.question_no}</div>
            <div className="q-text">{currentQ.question_text}</div>
            <div className="submit-count">ตอบแล้ว {submitCount} คน</div>
          </div>
        ) : (
          <div className="q-display"><div className="q-text">ยังไม่ได้เริ่มข้อคำถาม</div></div>
        )}

        <div className="controls">
          {!currentQ && (
            <button className="btn-primary" disabled={busy || questions.length === 0} onClick={() => goToQuestion(1)}>
              เริ่มข้อที่ 1
            </button>
          )}
          {currentQ && hasNext && (
            <button className="btn-primary" disabled={busy} onClick={() => goToQuestion(nextQno)}>
              ข้อถัดไป (ข้อ {nextQno})
            </button>
          )}
          {currentQ && !hasNext && (
            <button className="btn-primary" disabled={busy} onClick={finishQuiz}>จบการแข่งขัน (ข้อสุดท้ายแล้ว)</button>
          )}
          {currentQ && (
            <button className="btn-danger" disabled={busy} onClick={finishQuiz}>จบตอนนี้เลย</button>
          )}
          {session.status !== "waiting" && (
            <button className="btn-ghost" disabled={busy} onClick={resetSession}>รีเซ็ตกลับหน้ารอ</button>
          )}
        </div>
      </div>

      <div className="card">
        <h2 style={{ fontSize: 15, marginTop: 0 }}>รายการคำถามทั้งหมด</h2>
        <div className="qlist">
          {questions.map(q => (
            <div className={`qlist-row ${session.current_question_no === q.question_no ? "current" : ""}`} key={q.id}>
              <span>ข้อ {q.question_no}: {q.question_text.slice(0, 50)}{q.question_text.length > 50 ? "..." : ""}</span>
              <button className="btn-ghost" style={{ padding: "4px 10px", fontSize: 12 }} disabled={busy} onClick={() => goToQuestion(q.question_no)}>
                ไปข้อนี้
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => { setSession(data.session); setChecking(false); });
    const { data: listener } = supabase.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (checking) return <div className="wrap"><p className="sub">กำลังตรวจสอบสิทธิ์...</p></div>;
  if (!session) return <div className="wrap"><LoginBox onLoggedIn={setSession} /></div>;

  return (
    <div className="wrap">
      <div style={{ textAlign: "right", marginBottom: 12 }}>
        <button className="btn-ghost" onClick={() => supabase.auth.signOut()}>ออกจากระบบ</button>
      </div>
      <ControlPanel />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
