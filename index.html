<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anatomy Quick Quiz</title>
<style>
  :root { --ink: #4a3540; --ink-soft: #9b8790; --line: #f5dfe6; --bg: #fff8f3; --accent: #16b897; --accent-soft: #d9f5ec; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .wrap { max-width: 460px; width: 100%; text-align: center; }
  .title { font-size: 30px; font-weight: 700; margin-bottom: 6px; }
  .sub { color: var(--ink-soft); font-size: 15px; margin-bottom: 36px; }
  .role-card {
    display: flex; align-items: center; gap: 18px; background: #fff; border: 1px solid var(--line);
    border-radius: 20px; padding: 22px 24px; margin-bottom: 16px; text-decoration: none; color: var(--ink);
    box-shadow: 0 3px 14px rgba(74,53,64,0.06); text-align: left;
  }
  .role-icon { font-size: 34px; flex-shrink: 0; }
  .role-title { font-size: 18px; font-weight: 700; }
  .role-desc { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">🦴 Anatomy Quick Quiz</div>
  <div class="sub">เลือกว่าคุณเป็นใคร</div>

  <a class="role-card" href="admin.html">
    <span class="role-icon">🔐</span>
    <span>
      <div class="role-title">แอดมิน</div>
      <div class="role-desc">จัดการคำถาม, อนุมัติผู้เข้าแข่งขัน, ควบคุมการแข่งขัน</div>
    </span>
  </a>

  <a class="role-card" href="participant.html">
    <span class="role-icon">🎯</span>
    <span>
      <div class="role-title">ผู้เข้าแข่งขัน</div>
      <div class="role-desc">สมัครเข้าแข่งขัน หรือเข้าตอบคำถามในวันแข่ง</div>
    </span>
  </a>
</div>
</body>
</html>
