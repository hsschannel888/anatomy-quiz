<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anatomy Quick Quiz - จัดการคำถาม</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #4a3540;
    --ink-soft: #9b8790;
    --line: #f5dfe6;
    --bg: #fff8f3;
    --card: #ffffff;
    --accent: #16b897;
    --accent-soft: #d9f5ec;
    --danger: #ef6f6f;
    --danger-soft: #ffe8e8;
    --radius: 20px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Noto Sans Thai", sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 28px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; font-weight: 500; }
  input[type=text], input[type=email], input[type=password], input[type=number], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 14px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
    background: #fff;
    color: var(--ink);
  }
  textarea { resize: vertical; min-height: 60px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    border-radius: 14px;
    border: none;
    padding: 10px 18px;
    cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #119b81; }
  .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .btn-ghost:hover { border-color: var(--ink-soft); }
  .btn-danger { background: var(--danger-soft); color: var(--danger); }
  .btn-danger:hover { background: #eedada; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .choice-option {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--line); border-radius: 14px; padding: 8px 10px; margin-bottom: 10px;
  }
  .choice-option input[type=text] { margin-bottom: 0; }
  .choice-letter {
    width: 26px; height: 26px; border-radius: 50%; background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .radio-correct { flex-shrink: 0; width: 18px; height: 18px; accent-color: var(--accent); }
  .qlist-item {
    display: flex; gap: 14px; padding: 14px; border: 1px solid var(--line); border-radius: 14px; margin-bottom: 10px; align-items: flex-start;
  }
  .qlist-thumb { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; background: var(--bg); flex-shrink: 0; }
  .qlist-thumb.empty { display: flex; align-items: center; justify-content: center; color: var(--ink-soft); font-size: 11px; border: 1px dashed var(--line); }
  .qlist-body { flex: 1; min-width: 0; }
  .qlist-no { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
  .qlist-text { font-size: 14px; margin: 2px 0 6px; }
  .qlist-choices { font-size: 12px; color: var(--ink-soft); display: flex; gap: 14px; flex-wrap: wrap; }
  .correct-tag { color: var(--accent); font-weight: 600; }
  .qlist-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .counter-badge {
    display: inline-block; background: var(--accent-soft); color: var(--accent);
    padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 18px;
  }
  .counter-badge.incomplete { background: #fbeee0; color: #8a5a1f; }
  .error-msg { background: var(--danger-soft); color: var(--danger); padding: 10px 14px; border-radius: 14px; font-size: 13px; margin-bottom: 14px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-soft); font-size: 14px; }
  .login-box { max-width: 360px; margin: 80px auto 0; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .img-upload-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .img-preview { width: 64px; height: 64px; border-radius: 14px; object-fit: cover; border: 1px solid var(--line); }

  .btn-primary, button.primary { border-radius: 999px !important; box-shadow: 0 3px 10px rgba(22,184,151,0.25); }
  .card { box-shadow: 0 3px 14px rgba(74,53,64,0.06); }
  h1 { letter-spacing: -0.2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ---- ตั้งค่าการเชื่อมต่อ Supabase ----
const SUPABASE_URL = "https://jepqcpxgffjlbpucyxhq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcHFjcHhnZmZqbGJwdWN5eGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTA3NzAsImV4cCI6MjA5OTkyNjc3MH0.RBsPcR1ujyD3ZE_JWslAaGDUJqJD7ku0TWn37tZDbCM";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CHOICES = ["A", "B", "C", "D"];
const emptyForm = { question_no: "", question_text: "", choice_a: "", choice_b: "", choice_c: "", choice_d: "", correct_choice: "A", image_url: "" };

function LoginBox({ onLoggedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setError("");
    setLoading(true);
    const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (err) { setError("อีเมลหรือรหัสผ่านไม่ถูกต้อง"); return; }
    onLoggedIn(data.session);
  };

  return (
    <div className="login-box">
      <div className="card">
        <h1>🔐 เข้าสู่ระบบแอดมิน</h1>
        <p className="sub">Anatomy Quick Quiz</p>
        {error && <div className="error-msg">{error}</div>}
        <label>อีเมล</label>
        <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="hsschannel888@gmail.com" />
        <label>รหัสผ่าน</label>
        <input type="password" value={password} onChange={e => setPassword(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleLogin()} />
        <button className="btn-primary" onClick={handleLogin} disabled={loading} style={{ width: "100%" }}>
          {loading ? "กำลังเข้าสู่ระบบ..." : "เข้าสู่ระบบ"}
        </button>
      </div>
    </div>
  );
}

function QuestionForm({ initial, onSaved, onCancel }) {
  const [form, setForm] = useState(initial || emptyForm);
  const [imageFile, setImageFile] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");

  const set = (key, val) => setForm(f => ({ ...f, [key]: val }));

  const handleSave = async () => {
    setError("");
    if (!form.question_no || !form.question_text || !form.choice_a || !form.choice_b || !form.choice_c || !form.choice_d) {
      setError("กรอกข้อมูลให้ครบทุกช่องก่อนบันทึก");
      return;
    }
    setUploading(true);
    let image_url = form.image_url || null;

    if (imageFile) {
      const fileExt = imageFile.name.split(".").pop();
      const fileName = `q${form.question_no}-${Date.now()}.${fileExt}`;
      const { error: uploadErr } = await supabase.storage.from("question-images").upload(fileName, imageFile);
      if (uploadErr) {
        setError("อัปโหลดรูปไม่สำเร็จ: " + uploadErr.message);
        setUploading(false);
        return;
      }
      const { data: urlData } = supabase.storage.from("question-images").getPublicUrl(fileName);
      image_url = urlData.publicUrl;
    }

    const payload = {
      question_no: parseInt(form.question_no, 10),
      question_text: form.question_text,
      choice_a: form.choice_a,
      choice_b: form.choice_b,
      choice_c: form.choice_c,
      choice_d: form.choice_d,
      image_url,
    };

    let questionId = form.id;
    if (questionId) {
      const { error: updErr } = await supabase.from("questions").update(payload).eq("id", questionId);
      if (updErr) { setError("บันทึกไม่สำเร็จ: " + updErr.message); setUploading(false); return; }
    } else {
      const { data: inserted, error: insErr } = await supabase.from("questions").insert(payload).select().single();
      if (insErr) { setError("บันทึกไม่สำเร็จ: " + insErr.message); setUploading(false); return; }
      questionId = inserted.id;
    }

    const { error: keyErr } = await supabase.from("answer_keys").upsert({ question_id: questionId, correct_choice: form.correct_choice });
    if (keyErr) { setError("บันทึกเฉลยไม่สำเร็จ: " + keyErr.message); setUploading(false); return; }

    setUploading(false);
    onSaved();
  };

  return (
    <div className="card">
      <h1 style={{ marginBottom: 18 }}>{form.id ? "✏️ แก้ไขคำถาม" : "✨ เพิ่มคำถามใหม่"}</h1>
      {error && <div className="error-msg">{error}</div>}

      <div className="row2">
        <div>
          <label>ข้อที่</label>
          <input type="number" value={form.question_no} onChange={e => set("question_no", e.target.value)} placeholder="1" />
        </div>
      </div>

      <label>คำถาม</label>
      <textarea value={form.question_text} onChange={e => set("question_text", e.target.value)} placeholder="พิมพ์คำถามที่นี่..." />

      <label>รูปภาพประกอบ (ถ้ามี)</label>
      <div className="img-upload-row">
        {(imageFile || form.image_url) && (
          <img className="img-preview" src={imageFile ? URL.createObjectURL(imageFile) : form.image_url} alt="preview" />
        )}
        <input type="file" accept="image/*" onChange={e => setImageFile(e.target.files[0])} />
      </div>

      <label>ตัวเลือกคำตอบ (เลือก radio ข้อที่ถูก)</label>
      {CHOICES.map(letter => (
        <div className="choice-option" key={letter}>
          <input
            type="radio"
            className="radio-correct"
            name="correct"
            checked={form.correct_choice === letter}
            onChange={() => set("correct_choice", letter)}
          />
          <span className="choice-letter">{letter}</span>
          <input
            type="text"
            value={form[`choice_${letter.toLowerCase()}`]}
            onChange={e => set(`choice_${letter.toLowerCase()}`, e.target.value)}
            placeholder={`ตัวเลือก ${letter}`}
          />
        </div>
      ))}

      <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
        <button className="btn-primary" onClick={handleSave} disabled={uploading}>
          {uploading ? "กำลังบันทึก..." : "บันทึกคำถาม"}
        </button>
        <button className="btn-ghost" onClick={onCancel}>ยกเลิก</button>
      </div>
    </div>
  );
}

function QuestionManager() {
  const [questions, setQuestions] = useState([]);
  const [answerKeys, setAnswerKeys] = useState({});
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [loading, setLoading] = useState(true);

  const loadQuestions = async () => {
    setLoading(true);
    const { data: qData } = await supabase.from("questions").select("*").order("question_no", { ascending: true });
    const { data: kData } = await supabase.from("answer_keys").select("*");
    setQuestions(qData || []);
    const keyMap = {};
    (kData || []).forEach(k => { keyMap[k.question_id] = k.correct_choice; });
    setAnswerKeys(keyMap);
    setLoading(false);
  };

  useEffect(() => { loadQuestions(); }, []);

  const handleDelete = async (id) => {
    if (!window.confirm("ลบคำถามข้อนี้? การลบไม่สามารถย้อนกลับได้")) return;
    await supabase.from("questions").delete().eq("id", id);
    loadQuestions();
  };

  const handleEdit = (q) => {
    setEditing({ ...q, correct_choice: answerKeys[q.id] || "A" });
    setShowForm(true);
  };

  const handleAddNew = () => {
    setEditing(null);
    setShowForm(true);
  };

  const total = questions.length;
  const isComplete = total >= 100;

  if (showForm) {
    return (
      <QuestionForm
        initial={editing}
        onCancel={() => setShowForm(false)}
        onSaved={() => { setShowForm(false); loadQuestions(); }}
      />
    );
  }

  return (
    <div>
      <div className="top-bar">
        <div>
          <h1>🦴 จัดการคำถาม</h1>
          <p className="sub">Anatomy Quick Quiz - คลังคำถามสำหรับรอบแข่งขันปัจจุบัน</p>
        </div>
        <button className="btn-primary" onClick={handleAddNew}>+ เพิ่มคำถาม</button>
      </div>

      <span className={`counter-badge ${isComplete ? "" : "incomplete"}`}>
        {total}/100 ข้อ {isComplete ? "ครบแล้ว" : "ยังไม่ครบ"}
      </span>

      {loading && <p className="sub">กำลังโหลด...</p>}

      {!loading && questions.length === 0 && (
        <div className="card empty-state">ยังไม่มีคำถามในระบบ กด "+ เพิ่มคำถาม" เพื่อเริ่มใส่ข้อแรก</div>
      )}

      {!loading && questions.map(q => (
        <div className="qlist-item" key={q.id}>
          {q.image_url ? (
            <img className="qlist-thumb" src={q.image_url} alt="" />
          ) : (
            <div className="qlist-thumb empty">ไม่มีรูป</div>
          )}
          <div className="qlist-body">
            <div className="qlist-no">ข้อ {q.question_no}</div>
            <div className="qlist-text">{q.question_text}</div>
            <div className="qlist-choices">
              {CHOICES.map(letter => (
                <span key={letter} className={answerKeys[q.id] === letter ? "correct-tag" : ""}>
                  {letter}. {q[`choice_${letter.toLowerCase()}`]} {answerKeys[q.id] === letter ? "✓" : ""}
                </span>
              ))}
            </div>
          </div>
          <div className="qlist-actions">
            <button className="btn-ghost btn-sm" onClick={() => handleEdit(q)}>แก้ไข</button>
            <button className="btn-danger btn-sm" onClick={() => handleDelete(q.id)}>ลบ</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setChecking(false);
    });
    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (checking) return <div className="wrap"><p className="sub">กำลังตรวจสอบสิทธิ์...</p></div>;

  if (!session) return <div className="wrap"><LoginBox onLoggedIn={setSession} /></div>;

  return (
    <div className="wrap">
      <div style={{ textAlign: "right", marginBottom: 12 }}>
        <button className="btn-ghost btn-sm" onClick={() => supabase.auth.signOut()}>ออกจากระบบ</button>
      </div>
      <QuestionManager />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
