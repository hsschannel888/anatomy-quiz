<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เริ่มรอบใหม่ - Anatomy Quick Quiz</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #4a3540; --ink-soft: #9b8790; --line: #f5dfe6; --bg: #fff8f3; --card: #fff;
    --accent: #16b897; --accent-soft: #d9f5ec; --danger: #ef6f6f; --danger-soft: #ffe8e8;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system,"Segoe UI","Noto Sans Thai",sans-serif; background: var(--bg); color: var(--ink); }
  .wrap { max-width: 640px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 20px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 24px; margin-bottom: 18px; }
  .step-title { font-size: 15px; font-weight: 600; margin: 0 0 6px; }
  .step-desc { font-size: 13px; color: var(--ink-soft); margin: 0 0 16px; }
  button { font-family: inherit; font-size: 14px; font-weight: 600; border-radius: 14px; border: none; padding: 11px 18px; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #119b81; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:disabled { background: #d7bcbc; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink-soft); }
  input[type=text] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 14px; font-size: 14px; margin: 10px 0 14px;
  }
  .warning-box { background: var(--danger-soft); color: var(--danger); padding: 14px 16px; border-radius: 14px; font-size: 13px; margin-bottom: 16px; }
  .success-msg { background: var(--accent-soft); color: var(--accent); padding: 12px 16px; border-radius: 14px; font-size: 13px; margin-bottom: 14px; }
  .login-box { max-width: 360px; margin: 80px auto 0; }
  label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; font-weight: 500; }
  .login-box input { margin-bottom: 14px; }
  .stat-row { display: flex; gap: 20px; margin-bottom: 4px; font-size: 13px; color: var(--ink-soft); }

  .btn-primary, button.primary { border-radius: 999px !important; box-shadow: 0 3px 10px rgba(22,184,151,0.25); }
  .card { box-shadow: 0 3px 14px rgba(74,53,64,0.06); }
  h1 { letter-spacing: -0.2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SUPABASE_URL = "https://jepqcpxgffjlbpucyxhq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcHFjcHhnZmZqbGJwdWN5eGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTA3NzAsImV4cCI6MjA5OTkyNjc3MH0.RBsPcR1ujyD3ZE_JWslAaGDUJqJD7ku0TWn37tZDbCM";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const CONFIRM_WORD = "ล้างข้อมูล";

function LoginBox({ onLoggedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const handleLogin = async () => {
    setError("");
    const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
    if (err) { setError("อีเมลหรือรหัสผ่านไม่ถูกต้อง"); return; }
    onLoggedIn(data.session);
  };
  return (
    <div className="login-box">
      <div className="card">
        <h1>🔐 เข้าสู่ระบบแอดมิน</h1>
        <p className="sub">เริ่มรอบใหม่</p>
        {error && <div className="warning-box">{error}</div>}
        <label>อีเมล</label>
        <input type="text" value={email} onChange={e => setEmail(e.target.value)} />
        <label>รหัสผ่าน</label>
        <input type="password" value={password} onChange={e => setPassword(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleLogin()} />
        <button className="btn-primary" style={{ width: "100%" }} onClick={handleLogin}>เข้าสู่ระบบ</button>
      </div>
    </div>
  );
}

function csvEscape(val) {
  const s = String(val == null ? "" : val);
  if (s.includes(",") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function downloadCsv(filename, rows) {
  const csvContent = rows.map(r => r.map(csvEscape).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function ResetPanel() {
  const [stats, setStats] = useState(null);
  const [confirmText, setConfirmText] = useState("");
  const [exported, setExported] = useState(false);
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);
  const [error, setError] = useState("");

  const loadStats = async () => {
    const { count: pCount } = await supabase.from("participants").select("id", { count: "exact", head: true });
    const { count: qCount } = await supabase.from("questions").select("id", { count: "exact", head: true });
    setStats({ participants: pCount || 0, questions: qCount || 0 });
  };

  useEffect(() => { loadStats(); }, []);

  const exportResults = async () => {
    setBusy(true);
    setError("");
    const { data: participants } = await supabase.from("participants").select("id, code, first_name, last_name, team_id");
    const { data: teams } = await supabase.from("teams").select("id, team_name");
    const { data: questions } = await supabase.from("questions").select("id, question_no").order("question_no", { ascending: true });
    const { data: submissions } = await supabase.from("submissions").select("participant_id, question_id, score, response_time_ms, is_correct");

    const teamMap = {};
    (teams || []).forEach(t => { teamMap[t.id] = t.team_name; });

    const qnoByQid = {};
    (questions || []).forEach(q => { qnoByQid[q.id] = q.question_no; });
    const questionNos = (questions || []).map(q => q.question_no);

    const agg = {};
    const perQuestion = {}; // { participant_id: { question_no: "✓" | "✗" } }
    (submissions || []).forEach(s => {
      if (!agg[s.participant_id]) agg[s.participant_id] = { score: 0, time: 0, correct: 0 };
      agg[s.participant_id].score += s.score || 0;
      agg[s.participant_id].time += s.response_time_ms || 0;
      if (s.is_correct) agg[s.participant_id].correct += 1;

      if (!perQuestion[s.participant_id]) perQuestion[s.participant_id] = {};
      const qno = qnoByQid[s.question_id];
      if (qno != null) perQuestion[s.participant_id][qno] = s.is_correct ? "✓" : "✗";
    });

    const rows = (participants || []).map(p => {
      const a = agg[p.id] || { score: 0, time: 0, correct: 0 };
      return {
        id: p.id,
        code: p.code,
        name: `${p.first_name} ${p.last_name}`,
        team: teamMap[p.team_id] || "",
        score: a.score,
        correct: a.correct,
        time: a.time,
      };
    }).sort((x, y) => (y.score - x.score) || (x.time - y.time));

    // --- ไฟล์ที่ 1: สรุปอันดับ ---
    const summaryRows = [["อันดับ", "รหัส", "ชื่อ-นามสกุล", "ทีม", "คะแนนรวม", "ตอบถูก", "เวลารวม (ms)"]];
    rows.forEach((r, i) => summaryRows.push([i + 1, r.code, r.name, r.team, r.score, r.correct, r.time]));

    // --- ไฟล์ที่ 2: ตารางถูก/ผิดรายข้อ (คน x ข้อ) ---
    const matrixHeader = ["รหัส", "ชื่อ-นามสกุล", ...questionNos.map(n => `ข้อ ${n}`)];
    const matrixRows = [matrixHeader];
    rows.forEach(r => {
      const perQ = perQuestion[r.id] || {};
      const cells = questionNos.map(n => perQ[n] || "–");
      matrixRows.push([r.code, r.name, ...cells]);
    });

    const dateStr = new Date().toISOString().slice(0, 10);
    downloadCsv(`anatomy-quiz-results-${dateStr}.csv`, summaryRows);
    downloadCsv(`anatomy-quiz-answers-detail-${dateStr}.csv`, matrixRows);
    setExported(true);
    setBusy(false);
  };

  const deleteAllTable = async (table, idCol) => {
    await supabase.from(table).delete().not(idCol, "is", null);
  };

  const handleReset = async () => {
    if (confirmText !== CONFIRM_WORD) return;
    setBusy(true);
    setError("");
    try {
      await deleteAllTable("submissions", "id");
      await deleteAllTable("answer_keys", "question_id");
      await deleteAllTable("questions", "id");
      await deleteAllTable("participants", "id");
      await deleteAllTable("teams", "id");
      await supabase.from("session").update({ status: "waiting", current_question_no: null, question_started_at: null }).eq("id", 1);
      setDone(true);
    } catch (e) {
      setError("เกิดข้อผิดพลาดระหว่างล้างข้อมูล: " + e.message);
    }
    setBusy(false);
  };

  if (done) {
    return (
      <div className="card">
        <div className="success-msg">✓ ล้างข้อมูลเรียบร้อยแล้ว พร้อมสำหรับรอบการแข่งขันใหม่</div>
        <p className="sub">ไปที่หน้าจัดการคำถามเพื่อเริ่มใส่คำถามชุดใหม่ได้เลย</p>
      </div>
    );
  }

  return (
    <div>
      <div className="card">
        <div className="step-title">สถานะข้อมูลปัจจุบัน</div>
        {stats && (
          <div className="stat-row">
            <span>ผู้เข้าแข่งขัน: {stats.participants} คน</span>
            <span>คำถาม: {stats.questions} ข้อ</span>
          </div>
        )}
      </div>

      <div className="card">
        <div className="step-title">ขั้นที่ 1: Export ผลการแข่งขัน</div>
        <p className="step-desc">ดาวน์โหลด 2 ไฟล์: (1) สรุปคะแนน+อันดับ (2) ตารางถูก/ผิดรายข้อของทุกคน แนะนำให้ export ทุกครั้งก่อนเริ่มรอบใหม่</p>
        <button className="btn-primary" onClick={exportResults} disabled={busy}>
          {busy && !exported ? "กำลัง export..." : "Export CSV"}
        </button>
        {exported && <p className="success-msg" style={{ marginTop: 12 }}>✓ ดาวน์โหลดไฟล์แล้ว</p>}
      </div>

      <div className="card">
        <div className="step-title" style={{ color: "var(--danger)" }}>ขั้นที่ 2: ล้างข้อมูลทั้งหมด</div>
        <div className="warning-box">
          การกระทำนี้จะลบ <strong>ผู้เข้าแข่งขัน, คำถาม, เฉลย, คำตอบ, ทีม</strong> ทั้งหมดอย่างถาวร ย้อนกลับไม่ได้
          {!exported && " แนะนำให้ export ข้อมูลในขั้นที่ 1 ก่อน"}
        </div>
        <label>พิมพ์คำว่า "{CONFIRM_WORD}" เพื่อยืนยัน</label>
        <input type="text" value={confirmText} onChange={e => setConfirmText(e.target.value)} placeholder={CONFIRM_WORD} />
        {error && <div className="warning-box">{error}</div>}
        <button className="btn-danger" disabled={confirmText !== CONFIRM_WORD || busy} onClick={handleReset}>
          {busy ? "กำลังล้างข้อมูล..." : "ล้างข้อมูลทั้งหมด"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => { setSession(data.session); setChecking(false); });
    const { data: listener } = supabase.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (checking) return <div className="wrap"><p className="sub">กำลังตรวจสอบสิทธิ์...</p></div>;
  if (!session) return <div className="wrap"><LoginBox onLoggedIn={setSession} /></div>;

  return (
    <div className="wrap">
      <div style={{ textAlign: "right", marginBottom: 12 }}>
        <button className="btn-ghost" onClick={() => supabase.auth.signOut()}>ออกจากระบบ</button>
      </div>
      <h1>🔄 เริ่มรอบการแข่งขันใหม่</h1>
      <p className="sub">Anatomy Quick Quiz</p>
      <ResetPanel />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
