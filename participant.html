<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ผู้เข้าแข่งขัน - Anatomy Quick Quiz</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
    background: #fff8f3; color: #4a3540; min-height: 100vh;
  }
  body.themed { background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; }
  body.themed .card { background: rgba(255,255,255,0.94); }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 18px 60px; }
  .back-link { display: inline-block; font-size: 13px; color: #9b8790; text-decoration: none; margin-bottom: 16px; }
  .card { background: #fff; border: 1px solid #f5dfe6; border-radius: 22px; padding: 24px; box-shadow: 0 3px 14px rgba(74,53,64,0.06); }
  h1 { font-size: 20px; font-weight: 700; margin: 0 0 4px; text-align: center; }
  .sub { color: #9b8790; font-size: 14px; text-align: center; margin: 0 0 20px; }
  .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn {
    flex: 1; background: #fff8f3; border: 1px solid #f5dfe6; color: #9b8790; border-radius: 999px;
    padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .tab-btn.active { background: #16b897; color: #fff; border-color: #16b897; }
  label { display: block; font-size: 13px; color: #9b8790; margin-bottom: 6px; font-weight: 500; }
  input[type=text] { width: 100%; padding: 12px 14px; border: 1px solid #f5dfe6; border-radius: 16px; font-size: 15px; margin-bottom: 16px; }
  input[type=text]:focus { outline: none; border-color: #16b897; }
  button.primary { width: 100%; background: #16b897; color: #fff; font-weight: 700; font-size: 15px; border: none; border-radius: 999px; padding: 13px; cursor: pointer; box-shadow: 0 3px 10px rgba(22,184,151,0.25); }
  button.primary:disabled { background: #d8cdd1; box-shadow: none; }
  .error-msg { background: #ffe8e8; color: #ef6f6f; padding: 10px 14px; border-radius: 14px; font-size: 13px; margin-bottom: 16px; }
  .success-box { text-align: center; padding: 20px 0; }
  .success-icon { font-size: 40px; margin-bottom: 12px; }
  .success-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .success-text { color: #9b8790; font-size: 14px; line-height: 1.6; }
  .top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .greet { font-size: 14px; color: #9b8790; }
  .my-score { font-size: 16px; font-weight: 700; color: #16b897; }
  .status-title { text-align: center; font-size: 20px; font-weight: 700; margin: 30px 0 8px; }
  .status-sub { text-align: center; color: #9b8790; font-size: 14px; }
  .q-no-badge { text-align: center; font-size: 13px; color: #9b8790; margin-bottom: 6px; }
  .timer-badge { text-align: center; font-size: 40px; font-weight: 700; margin-bottom: 24px; }
  .timer-badge.low { color: #d85a30; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .choice-btn { aspect-ratio: 1; border-radius: 24px; border: none; font-size: 34px; font-weight: 700; color: #fff; cursor: pointer; }
  .choice-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .choice-a { background: #378ADD; } .choice-b { background: #D85A30; } .choice-c { background: #639922; } .choice-d { background: #D4537E; }
  .choice-btn.picked { outline: 5px solid #16b897; outline-offset: -5px; }
  .answered-box { text-align: center; padding: 40px 10px; }
  .answered-icon { font-size: 48px; margin-bottom: 12px; }
  .answered-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .answered-sub { color: #9b8790; font-size: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = "https://jepqcpxgffjlbpucyxhq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcHFjcHhnZmZqbGJwdWN5eGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTA3NzAsImV4cCI6MjA5OTkyNjc3MH0.RBsPcR1ujyD3ZE_JWslAaGDUJqJD7ku0TWn37tZDbCM";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const QUESTION_SECONDS = 30;
const STORAGE_KEY = "anatomy_quiz_participant";

function RegisterTab() {
  const [code, setCode] = useState("");
  const [firstName, setFirstName] = useState("");
  const [lastName, setLastName] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const handleSubmit = async () => {
    setError("");
    if (!code.trim() || !firstName.trim() || !lastName.trim()) { setError("กรอกข้อมูลให้ครบทุกช่อง"); return; }
    setLoading(true);
    const { error: err } = await supabase.from("participants").insert({
      code: code.trim(), first_name: firstName.trim(), last_name: lastName.trim(), approved: false,
    });
    setLoading(false);
    if (err) {
      setError(err.code === "23505" ? "รหัสประจำตัวนี้มีคนสมัครไปแล้ว" : "สมัครไม่สำเร็จ: " + err.message);
      return;
    }
    setSubmitted(true);
  };

  if (submitted) {
    return (
      <div className="success-box">
        <div className="success-icon">🎊</div>
        <div className="success-title">สมัครสำเร็จ</div>
        <p className="success-text">ข้อมูลของ {firstName} {lastName} ถูกส่งเข้าระบบแล้ว<br />กรุณารอการอนุมัติจากเจ้าหน้าที่ก่อนวันแข่งขัน</p>
      </div>
    );
  }

  return (
    <div>
      {error && <div className="error-msg">{error}</div>}
      <label>รหัสประจำตัว</label>
      <input type="text" value={code} onChange={e => setCode(e.target.value)} placeholder="กรอกรหัสประจำตัว" />
      <label>ชื่อจริง</label>
      <input type="text" value={firstName} onChange={e => setFirstName(e.target.value)} placeholder="ชื่อจริง" />
      <label>นามสกุล</label>
      <input type="text" value={lastName} onChange={e => setLastName(e.target.value)} placeholder="นามสกุล"
        onKeyDown={e => e.key === "Enter" && handleSubmit()} />
      <button className="primary" onClick={handleSubmit} disabled={loading}>
        {loading ? "กำลังส่งข้อมูล..." : "สมัครเข้าแข่งขัน"}
      </button>
    </div>
  );
}

function CodeEntry({ onIdentified }) {
  const [code, setCode] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setError("");
    if (!code.trim()) { setError("กรอกรหัสประจำตัว"); return; }
    setLoading(true);
    const { data, error: err } = await supabase.from("participants").select("*").eq("code", code.trim()).maybeSingle();
    setLoading(false);
    if (err || !data) { setError("ไม่พบรหัสนี้ในระบบ"); return; }
    if (!data.approved) { setError("รหัสนี้ยังไม่ได้รับการอนุมัติ กรุณาติดต่อเจ้าหน้าที่"); return; }
    const info = { id: data.id, name: `${data.first_name} ${data.last_name}` };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(info));
    onIdentified(info);
  };

  return (
    <div>
      {error && <div className="error-msg">{error}</div>}
      <label>รหัสประจำตัว (ที่ได้รับอนุมัติแล้ว)</label>
      <input type="text" value={code} onChange={e => setCode(e.target.value)}
        onKeyDown={e => e.key === "Enter" && handleSubmit()} placeholder="กรอกรหัสของคุณ" />
      <button className="primary" onClick={handleSubmit} disabled={loading}>
        {loading ? "กำลังตรวจสอบ..." : "เข้าสู่การแข่งขัน"}
      </button>
    </div>
  );
}

function QuizArea({ participant, onExit }) {
  const [session, setSession] = useState(null);
  const [question, setQuestion] = useState(null);
  const [secondsLeft, setSecondsLeft] = useState(QUESTION_SECONDS);
  const [answeredQno, setAnsweredQno] = useState(null);
  const [pickedChoice, setPickedChoice] = useState(null);
  const [totalScore, setTotalScore] = useState(0);
  const tickRef = useRef(null);

  const loadSession = async () => {
    const { data } = await supabase.from("session").select("*").eq("id", 1).single();
    setSession(data);
  };
  const loadMyScore = async () => {
    const { data } = await supabase.from("submissions").select("score").eq("participant_id", participant.id);
    setTotalScore((data || []).reduce((sum, s) => sum + (s.score || 0), 0));
  };

  useEffect(() => {
    loadSession();
    loadMyScore();
    const channel = supabase.channel("participant-session-watch")
      .on("postgres_changes", { event: "*", schema: "public", table: "session" }, () => loadSession())
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, []);

  useEffect(() => {
    if (!session || !session.current_question_no) { setQuestion(null); return; }
    supabase.from("questions").select("id,question_no").eq("question_no", session.current_question_no).single()
      .then(({ data }) => setQuestion(data));
    setPickedChoice(null);
  }, [session && session.current_question_no]);

  useEffect(() => {
    clearInterval(tickRef.current);
    if (!session || !session.question_started_at) return;
    const started = new Date(session.question_started_at).getTime();
    const update = () => {
      const elapsed = (Date.now() - started) / 1000;
      setSecondsLeft(Math.max(0, Math.ceil(QUESTION_SECONDS - elapsed)));
    };
    update();
    tickRef.current = setInterval(update, 250);
    return () => clearInterval(tickRef.current);
  }, [session && session.question_started_at]);

  const submitAnswer = async (choice) => {
    if (!question || pickedChoice) return;
    setPickedChoice(choice);
    const { error } = await supabase.rpc("submit_answer", {
      p_participant_id: participant.id, p_question_id: question.id, p_choice: choice,
    });
    if (!error) { setAnsweredQno(question.question_no); loadMyScore(); }
  };

  if (!session) return <p className="sub">กำลังโหลด...</p>;

  if (session.status === "finished") {
    return (
      <div className="status-box">
        <div className="status-title">🎊 จบการแข่งขัน 🎊</div>
        <div className="status-sub">คะแนนรวมของคุณ: {totalScore} คะแนน</div>
      </div>
    );
  }

  if (session.status === "waiting" || !question) {
    return (
      <div>
        <div className="top-info"><span className="greet">สวัสดี {participant.name}</span></div>
        <div className="status-title">🕐 รอเริ่มการแข่งขัน</div>
        <div className="status-sub">มองไปที่จอโปรเจกเตอร์ด้านหน้า</div>
      </div>
    );
  }

  const alreadyAnswered = pickedChoice || answeredQno === question.question_no;

  if (secondsLeft <= 0 || alreadyAnswered) {
    return (
      <div>
        <div className="top-info">
          <span className="greet">{participant.name}</span>
          <span className="my-score">{totalScore} คะแนน</span>
        </div>
        <div className="answered-box">
          <div className="answered-icon">{alreadyAnswered ? "✓" : "⏰"}</div>
          <div className="answered-title">{alreadyAnswered ? "ส่งคำตอบแล้ว เก่งมาก!" : "หมดเวลา"}</div>
          <div className="answered-sub">รอข้อถัดไปจากหน้าจอโปรเจกเตอร์</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="top-info">
        <span className="greet">{participant.name}</span>
        <span className="my-score">{totalScore} คะแนน</span>
      </div>
      <div className="q-no-badge">ข้อที่ {question.question_no}</div>
      <div className={`timer-badge ${secondsLeft <= 10 ? "low" : ""}`}>{secondsLeft}</div>
      <div className="choices">
        <button className="choice-btn choice-a" onClick={() => submitAnswer("A")}>A</button>
        <button className="choice-btn choice-b" onClick={() => submitAnswer("B")}>B</button>
        <button className="choice-btn choice-c" onClick={() => submitAnswer("C")}>C</button>
        <button className="choice-btn choice-d" onClick={() => submitAnswer("D")}>D</button>
      </div>
    </div>
  );
}

function StartTab() {
  const [participant, setParticipant] = useState(null);

  useEffect(() => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { try { setParticipant(JSON.parse(saved)); } catch (e) {} }
  }, []);

  if (!participant) return <CodeEntry onIdentified={setParticipant} />;
  return <QuizArea participant={participant} />;
}

function App() {
  const [tab, setTab] = useState("register");

  useEffect(() => {
    const applyTheme = async () => {
      const { data } = await supabase.from("session").select("theme_image_url").eq("id", 1).single();
      if (data && data.theme_image_url) {
        document.body.classList.add("themed");
        document.body.style.backgroundImage = `url(${data.theme_image_url})`;
      } else {
        document.body.classList.remove("themed");
        document.body.style.backgroundImage = "";
      }
    };
    applyTheme();
    const channel = supabase.channel("participant-theme-watch")
      .on("postgres_changes", { event: "*", schema: "public", table: "session" }, () => applyTheme())
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, []);

  return (
    <div className="wrap">
      <a className="back-link" href="index.html">← กลับหน้าแรก</a>
      <div className="card">
        <h1>🎯 Anatomy Quick Quiz</h1>
        <p className="sub">สำหรับผู้เข้าแข่งขัน</p>
        <div className="tab-bar">
          <button className={`tab-btn ${tab === "register" ? "active" : ""}`} onClick={() => setTab("register")}>สมัครเข้าแข่งขัน</button>
          <button className={`tab-btn ${tab === "start" ? "active" : ""}`} onClick={() => setTab("start")}>เริ่มแข่ง</button>
        </div>
        {tab === "register" ? <RegisterTab /> : <StartTab />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
